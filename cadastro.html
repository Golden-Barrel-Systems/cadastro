        let cpf = input_CPF.value;

        if (cpf.length == 4) {
            if (cpf.substring(3, 4) != ".") {
                input_CPF.value = cpf.substring(0, 3) + "." + cpf.substring(3);
            }
        }

        if (cpf.length == 8) {
            if (cpf.substring(7, 8) != ".") {
